<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "secondary-fixed": "#d8e2ff",
                        "tertiary-fixed-dim": "#ffb786",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c2c6d6",
                        "on-secondary-container": "#405682",
                        "surface": "#fcf8f8",
                        "surface-bright": "#fcf8f8",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#313030",
                        "primary": "#0058be",
                        "surface-dim": "#dcd9d9",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#723600",
                        "on-secondary-fixed-variant": "#304671",
                        "secondary-fixed-dim": "#b1c6f9",
                        "on-error": "#ffffff",
                        "surface-variant": "#e5e2e1",
                        "surface-container-high": "#ebe7e7",
                        "on-secondary-fixed": "#001a42",
                        "on-primary-fixed": "#001a42",
                        "secondary": "#495e8a",
                        "inverse-primary": "#adc6ff",
                        "outline": "#727785",
                        "on-primary-container": "#fefcff",
                        "secondary-container": "#b6ccff",
                        "inverse-on-surface": "#f3f0ef",
                        "on-primary-fixed-variant": "#004395",
                        "primary-container": "#2170e4",
                        "surface-container": "#f0edec",
                        "primary-fixed-dim": "#adc6ff",
                        "on-surface-variant": "#424754",
                        "surface-container-low": "#f6f3f2",
                        "on-secondary": "#ffffff",
                        "tertiary": "#924700",
                        "surface-container-highest": "#e5e2e1",
                        "background": "#fcf8f8",
                        "on-tertiary-fixed": "#311400",
                        "on-surface": "#1c1b1b",
                        "on-error-container": "#93000a",
                        "on-background": "#1c1b1b",
                        "tertiary-container": "#b75b00",
                        "surface-tint": "#005ac2",
                        "on-tertiary-container": "#fffbff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdcc6",
                        "primary-fixed": "#d8e2ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 1.25rem;
        }
        .ghost-border {
            border: 1.5px solid #EAEAEA;
        }
        .intel-trace {
            border-left: 2px solid #3B82F6;
        }
    </style>
</head>
<body class="bg-white text-[#0A0A0A] min-h-screen flex items-center justify-center overflow-hidden">
<!-- Suppressed Navigation Shell as per Transactional Rule -->
<!-- Main Authentication Canvas -->
<main class="w-full h-screen flex items-center justify-center px-6">
<!-- Asymmetric Breathing Room: Centered Modal but with wide internal padding -->
<div class="w-full max-w-md bg-white ghost-border rounded-lg p-12 md:p-16">
<!-- Branding / Context -->
<div class="mb-12">
<div class="flex items-center gap-2 mb-8">
<span class="w-2 h-8 bg-[#3B82F6]"></span>
<span class="text-[0.75rem] font-bold tracking-[0.05em] uppercase text-[#6B6B6B]">Zebra AI Platform</span>
</div>
<h1 class="text-[1.75rem] font-bold tracking-[-0.02em] text-[#0A0A0A] leading-tight">
                    Welcome back
                </h1>
<p class="text-[1.0rem] text-[#6B6B6B] mt-2 font-normal">
                    Precision editing for high-end digital experiences.
                </p>
</div>
<!-- Action Cluster -->
<div class="space-y-4">
<!-- Google Auth Button (Secondary Style) -->
<button class="w-full flex items-center justify-center gap-3 bg-white ghost-border py-4 px-6 rounded-lg text-[1.0rem] font-bold text-[#0A0A0A] hover:bg-neutral-50 transition-all duration-200 group">
<span class="material-symbols-outlined" data-icon="google">google</span>
<span>Continue with Google</span>
</button>
<!-- Email Auth Button (Secondary Style) -->
<button class="w-full flex items-center justify-center gap-3 bg-white ghost-border py-4 px-6 rounded-lg text-[1.0rem] font-bold text-[#0A0A0A] hover:bg-neutral-50 transition-all duration-200 group">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
<span>Continue with Email</span>
</button>
</div>
<!-- Footer Meta -->
<div class="mt-12 text-center">
<p class="text-[0.75rem] font-bold tracking-[0.05em] uppercase text-[#6B6B6B]">
                    New to the precision editor? 
                    <a class="text-[#3B82F6] hover:underline ml-1" href="#">Make an account</a>
</p>
</div>
</div>
</main>
<!-- Background Decorative Element (Subtle Asymmetry) -->
<div class="fixed top-0 right-0 w-1/3 h-full bg-[#F6F3F2] -z-10 hidden lg:block"></div>
<!-- Signature AI Trace Element (Decorative Footer) -->
<footer class="fixed bottom-8 left-12">
<div class="intel-trace pl-4">
<span class="text-[0.75rem] font-bold tracking-[0.05em] uppercase text-[#6B6B6B]">V 2.4.0 — Secure Entry</span>
</div>
</footer>
</body></html>
